name: Release App

on:
  push:
    tags:
      - 'v*' # v로 시작하는 태그(예: v1.0.0, v1.1.2) 푸시 시 동작

jobs:
  build_and_release:
    runs-on: windows-latest
    permissions:
      contents: write # Release 생성 및 파일 업로드를 위해 필수

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '10.0.x'

    # Node.js 설치 (Tailwind CSS 빌드를 위해 필요)
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '24'

    # 1. Velopack CLI(vpk) 도구 설치
    - name: Install vpk
      run: |
        dotnet tool install -g vpk
        echo "$env:USERPROFILE\.dotnet\tools" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

    # 2. Tailwind CSS 빌드
    - name: Build Tailwind CSS
      working-directory: eft-where-am-i
      run: |
        npm install
        npm run build:css

    # 3. 앱 빌드 및 Publish (런타임 미포함 - 기존)
    - name: Publish App (Framework Dependent)
      run: |
        dotnet publish eft-where-am-i/eft-where-am-i.csproj `
          -c Release `
          -r win-x64 `
          --self-contained false `
          -p:PublishSingleFile=false `
          -p:IncludeNativeLibrariesForSelfExtract=false `
          -o ./publish_output_fd

    # 4. 앱 빌드 및 Publish (런타임 포함 - 독립 실행형)
    - name: Publish App (Self-Contained)
      run: |
        dotnet publish eft-where-am-i/eft-where-am-i.csproj `
          -c Release `
          -r win-x64 `
          --self-contained true `
          -p:PublishSingleFile=false `
          -p:IncludeNativeLibrariesForSelfExtract=false `
          -o ./publish_output_sc

    # 5. Velopack 패키징 (런타임 미포함)
    - name: Pack App with Velopack (Framework Dependent)
      shell: bash
      run: |
        VERSION="${{ github.ref_name }}"
        VERSION=${VERSION#v}
        vpk pack \
          -u eft-where-am-i \
          -v $VERSION \
          -p ./publish_output_fd \
          -e "EFT-Where-Am-I.exe" \
          -o ./ReleaseBuild_FD

    # 6. Velopack 패키징 (런타임 포함)
    # '-c win-sc' 채널을 지정하여 기존(런타임 미포함) 업데이트 파이프라인과 분리합니다.
    - name: Pack App with Velopack (Self-Contained)
      shell: bash
      run: |
        VERSION="${{ github.ref_name }}"
        VERSION=${VERSION#v}
        vpk pack \
          -u eft-where-am-i \
          -v $VERSION \
          -c win-sc \
          -p ./publish_output_sc \
          -e "EFT-Where-Am-I.exe" \
          -o ./ReleaseBuild_SC

    # 7. GitHub Release 생성 및 파일 업로드 (Velopack Setup)
    - name: Upload Velopack Releases to GitHub
      shell: bash
      run: |
        vpk upload github \
          -o ./ReleaseBuild_FD \
          --repoUrl "https://github.com/karpitony/eft-where-am-i" \
          --token "${{ secrets.GITHUB_TOKEN }}" \
          --tag "${{ github.ref_name }}" \
          --merge
        
        vpk upload github \
          -o ./ReleaseBuild_SC \
          -c win-sc \
          --repoUrl "https://github.com/karpitony/eft-where-am-i" \
          --token "${{ secrets.GITHUB_TOKEN }}" \
          --tag "${{ github.ref_name }}" \
          --merge

    # 8. 릴리즈 노트에 설치 가이드 README 링크 추가
    - name: Append install guide to Release notes
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      shell: bash
      run: |
        EXISTING_BODY=$(gh release view "${{ github.ref_name }}" --json body -q .body 2>/dev/null || echo "")
        NOTICE="
        
        ---
        ### 📖 설치 안내 및 요구사항 (Installation & Requirements)

        - 자세한 다운로드/설치 방법 및 시스템 요구사항(.NET 10)은 [**README 문서**](https://github.com/karpitony/eft-where-am-i#%EB%8B%A4%EC%9A%B4%EB%A1%9C%EB%93%9C-%EB%B0%8F-%EC%84%A4%EC%B9%98)를 확인해 주세요.
        - For detailed installation instructions and system requirements(.NET 10), please refer to the [**README**](https://github.com/karpitony/eft-where-am-i/blob/main/README_en.md#download--installation)."
        gh release edit "${{ github.ref_name }}" --notes "${EXISTING_BODY}${NOTICE}"