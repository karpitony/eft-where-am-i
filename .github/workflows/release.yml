name: Release App

on:
  push:
    tags:
      - 'v*' # v로 시작하는 태그(예: v1.0.0, v1.1.2) 푸시 시 동작

jobs:
  build_and_release:
    runs-on: windows-latest
    permissions:
      contents: write # Release 생성 및 파일 업로드를 위해 필수

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '10.0.x'

    # Node.js 설치 (Tailwind CSS 빌드를 위해 필요)
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '24'

    # 1. Velopack CLI(vpk) 도구 설치
    - name: Install vpk
      run: |
        dotnet tool install -g vpk
        echo "$env:USERPROFILE\.dotnet\tools" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

    # 2. 앱 빌드 및 Publish
    - name: Publish App
      run: |
        dotnet publish eft-where-am-i/eft-where-am-i.csproj `
          -c Release `
          -r win-x64 `
          --self-contained false `
          -p:PublishSingleFile=false `
          -p:IncludeNativeLibrariesForSelfExtract=false `
          -o ./publish_output

    # 3. Portable zip 생성
    - name: Create Portable zip
      shell: bash
      run: |
        TAG="${{ github.ref_name }}"
        ZIP_NAME="eft-where-am-i-${TAG}-win-Portable.zip"
        cd ./publish_output
        7z a "../${ZIP_NAME}" .
        cd ..
        echo "ZIP_NAME=${ZIP_NAME}" >> $GITHUB_ENV

    # 4. Velopack 패키징
    - name: Pack App with Velopack
      shell: bash
      run: |
        VERSION="${{ github.ref_name }}"
        VERSION=${VERSION#v}
        vpk pack \
          -u eft-where-am-i \
          -v $VERSION \
          -p ./publish_output \
          -e "EFT-Where-Am-I.exe" \
          -o ./ReleaseBuild

    # 5. GitHub Release 생성 및 Velopack 파일 업로드 (nupkg, Setup.exe, RELEASES.json)
    - name: Upload to GitHub Release
      shell: bash
      run: |
        vpk upload github \
          -o ./ReleaseBuild \
          --repoUrl "https://github.com/karpitony/eft-where-am-i" \
          --token "${{ secrets.GITHUB_TOKEN }}" \
          --tag "${{ github.ref_name }}" \
          --merge

    # 5-1. Portable zip 별도 업로드 (vpk upload는 매니페스트 기준으로만 올림)
    - name: Upload Portable zip to GitHub Release
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      shell: bash
      run: |
        gh release upload "${{ github.ref_name }}" "./${{ env.ZIP_NAME }}" --clobber

    # 6. 릴리즈 노트에 다운로드 안내 및 .NET 런타임 안내 추가
    - name: Append install guide to Release notes
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      shell: bash
      run: |
        EXISTING_BODY=$(gh release view "${{ github.ref_name }}" --json body -q .body 2>/dev/null || echo "")
        ZIP="${{ env.ZIP_NAME }}"
        NOTICE="

        ---
        ### 📥 Download / 다운로드 방법

        **① Download \`${ZIP}\`, extract, and run.** (Recommended)
        **② \`*-win-Setup.exe\`** is the Velopack installer and may trigger antivirus warnings — prefer the zip.

        **① \`${ZIP}\`** 를 다운로드 후 압축해제하고 바로 실행하세요. (Recommended)
        **② \`*-win-Setup.exe\`** 는 Velopack 설치 프로그램이며 백신에서 오탐할 수 있어 zip 사용을 권장합니다.

        ### ⚙️ Requirements

        This app requires **.NET 10 Desktop Runtime (x64)** to run.
        If you get an error on launch, please install the runtime from the link below.

        👉 [Download .NET 10 Desktop Runtime](https://dotnet.microsoft.com/en-us/download/dotnet/10.0)


        이 앱은 **.NET 10 Desktop Runtime (x64)** 이 설치되어 있어야 합니다.
        실행 시 오류가 발생한다면 아래 링크에서 런타임을 설치해 주세요.

        👉 [.NET 10 Desktop Runtime 다운로드](https://dotnet.microsoft.com/ko-kr/download/dotnet/10.0)"

        gh release edit "${{ github.ref_name }}" --notes "${EXISTING_BODY}${NOTICE}"